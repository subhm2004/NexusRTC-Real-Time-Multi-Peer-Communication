# Render Blueprint — https://render.com/docs/blueprint-spec
# After deploy: Dashboard → nexus-rtc → Environment → add TURN_* and optional SENTRY DSN
services:
  - type: web
    name: nexus-rtc
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: 0.0.0.0
      - key: SESSION_TTL_MS
        value: "86400000"
      - key: ROOM_IDLE_TTL_MS
        value: "86400000"
      - key: MAX_PEERS
        value: "6"
      - key: MAX_RECORDING_MB
        value: "200"
      # Set these manually in Render dashboard (secrets):
      - key: TURN_URL
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
